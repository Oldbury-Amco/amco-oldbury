<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oldbury Load Plan</title>

<style>

:root{
--red:#d71920;
--white:#ffffff;
--black:#111111;
--g100:#f3f4f6;
--g200:#e5e7eb;
--g700:#4b5563;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--g100);
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
background:white;
border-bottom:4px solid var(--red);
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
height:34px;
}

.titles .h1{
font-weight:900;
font-size:18px;
}

.titles .sub{
font-size:12px;
color:var(--g700);
margin-top:4px;
}

.controls button{
background:var(--red);
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

.tabs{
background:white;
border-bottom:1px solid var(--g200);
padding:10px 16px;
display:flex;
gap:8px;
}

.tab{
border:1px solid var(--g200);
background:white;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}

.tab.active{
background:rgba(215,25,32,0.1);
border-color:rgba(215,25,32,0.35);
}

.main{
flex:1;
padding:12px 16px;
}

.panel{
background:white;
border:1px solid var(--g200);
border-radius:14px;
overflow:hidden;
height:100%;
}

iframe{
width:100%;
height:100%;
border:0;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
<img src="amco-logo.png" alt="AMCO" onerror="this.style.display='none'">
<div class="titles">
<div class="h1" id="pageTitle">Oldbury Load Plan</div>
<div class="sub">View • Print</div>
</div>
</div>

<div class="controls">
<button onclick="printCurrent()">Print</button>
</div>

</div>

<div class="tabs">

<button class="tab active" id="tLoad" onclick="showTab('load')">LOAD PLAN</button>

<button class="tab" id="tCheck" onclick="showTab('check')">CHECK SHEET</button>

</div>

<div class="main">

<div class="panel">

<iframe id="fLoad"
src="https://1drv.ms/x/c/fb0193fc1e0928af/IQSQRZ0tU67CRasF94cTpdglARcEOH1AGRrCQwmRZzFbRbA?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True">
</iframe>

<iframe id="fCheck" class="hidden"
src="https://1drv.ms/x/c/fb0193fc1e0928af/IQSOOXaNEWDxSYdAcL2P06zGAcIIEj4VZkLDOePdVlAhBl8?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True">
</iframe>

</div>

</div>

<script>

let current="load";

function showTab(which){

current=which;

const load=document.getElementById("fLoad");
const check=document.getElementById("fCheck");

const tabLoad=document.getElementById("tLoad");
const tabCheck=document.getElementById("tCheck");

const title=document.getElementById("pageTitle");

if(which==="load"){

load.classList.remove("hidden");
check.classList.add("hidden");

tabLoad.classList.add("active");
tabCheck.classList.remove("active");

title.textContent="Oldbury Load Plan";

}

else{

check.classList.remove("hidden");
load.classList.add("hidden");

tabCheck.classList.add("active");
tabLoad.classList.remove("active");

title.textContent="Oldbury Check Sheet";

}

}

function printCurrent(){

if(current==="load"){

window.open("print-load.html","_blank");

}

else{

window.open("print-check.html","_blank");

}

}

</script>

</body>
</html>
