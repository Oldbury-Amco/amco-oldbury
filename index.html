<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Oldbury Load Plan</title>

<style>

:root{
--red:#d71920;
--white:#ffffff;
--black:#111111;
--g100:#f3f4f6;
--g200:#e5e7eb;
--g700:#4b5563;
}

*{box-sizing:border-box;}

html,body{
height:100%;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--g100);
display:flex;
flex-direction:column;
min-height:100vh;
}

.topbar{
background:var(--white);
border-bottom:4px solid var(--red);
padding:12px 16px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
height:34px;
}

.titles .h1{
font-weight:900;
font-size:18px;
}

.titles .sub{
font-size:12px;
color:var(--g700);
margin-top:3px;
}

.controls{
display:flex;
gap:10px;
}

.btn{
border:1px solid var(--g200);
background:white;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
font-weight:900;
}

.btn.primary{
background:var(--red);
color:white;
border-color:var(--red);
}

.tabs{
background:white;
border-bottom:1px solid var(--g200);
padding:10px 16px;
display:flex;
gap:8px;
}

.tab{
border:1px solid var(--g200);
background:white;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
font-weight:900;
}

.tab.active{
background:rgba(215,25,32,0.10);
border-color:rgba(215,25,32,0.35);
}

.main{
flex:1;
padding:12px 16px 16px;
}

.panel{
background:white;
border:1px solid var(--g200);
border-radius:16px;
overflow:hidden;
height:100%;
}

iframe{
width:100%;
height:100%;
border:0;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
<img src="amco-logo.png" alt="AMCO">
<div class="titles">
<div class="h1" id="pageTitle">Oldbury Load Plan</div>
<div class="sub">View • Print • Share (read-only)</div>
</div>
</div>

<div class="controls">
<button class="btn" onclick="printCurrent()">Open for printing</button>
<button class="btn primary" onclick="printBoth()">Open both</button>
</div>

</div>

<div class="tabs">
<button class="tab active" id="tLoad" onclick="show('load')">LOAD PLAN</button>
<button class="tab" id="tCheck" onclick="show('check')">CHECK SHEET</button>
</div>

<div class="main">

<div class="panel">

<iframe id="fLoad"
src="https://1drv.ms/x/c/fb0193fc1e0928af/IQSQRZ0tU67CRasF94cTpdglARcEOH1AGRrCQwmRZzFbRbA?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True">
</iframe>

<iframe id="fCheck" class="hidden"
src="https://1drv.ms/x/c/fb0193fc1e0928af/IQSOOXaNEWDxSYdAcL2P06zGAcIIEj4VZkLDOePdVlAhBl8?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True">
</iframe>

</div>

</div>

<script>

let current='load';

function show(which){

current=which;

const fLoad=document.getElementById('fLoad');
const fCheck=document.getElementById('fCheck');
const tLoad=document.getElementById('tLoad');
const tCheck=document.getElementById('tCheck');
const title=document.getElementById('pageTitle');

if(which==='load'){
fLoad.classList.remove('hidden');
fCheck.classList.add('hidden');
tLoad.classList.add('active');
tCheck.classList.remove('active');
title.textContent='Oldbury Load Plan';
}
else{
fCheck.classList.remove('hidden');
fLoad.classList.add('hidden');
tCheck.classList.add('active');
tLoad.classList.remove('active');
title.textContent='Oldbury Check Sheet';
}

}

function printCurrent(){

if(current==='load'){
window.open(document.getElementById('fLoad').src,'_blank');
}
else{
window.open(document.getElementById('fCheck').src,'_blank');
}

}

function printBoth(){

window.open(document.getElementById('fLoad').src,'_blank');
window.open(document.getElementById('fCheck').src,'_blank');

}

</script>

</body>
</html>
